<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelForge Studio Pro</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="toolbar">
        <div class="logo">🎮 PixelForge Studio</div>
        <div class="project-controls">
            <button id="btn-run" class="btn success">▶ Run Game</button>
            <button id="btn-stop" class="btn danger">🛑 Stop</button>
        </div>
        <div class="view-switcher">
            <button class="tab-btn active" data-target="code-workspace">💻 Code & Viewport</button>
            <button class="tab-btn" data-target="sprite-workspace">🎨 Sprite Editor</button>
            <button class="tab-btn" data-target="music-workspace">🎵 Music Maker</button>
        </div>
    </header>

    <div class="main-container">
        <aside class="sidebar">
            <div class="sidebar-section">
                <h3>📜 Scripts</h3>
                <ul class="asset-list">
                    <li class="active">main.pf</li>
                </ul>
            </div>
        </aside>

        <main class="workspace">
            
            <section id="code-workspace" class="workspace-view active">
                <div class="split-panel">
                    <div class="editor-pane">
                        <div class="editor-header">Editing: <span>main.pf</span></div>
                        <textarea id="code-textarea" spellcheck="false">// ForgeScript Test Code
let playerX = 10
let playerY = 80

fn init() {
    print("Welcome to PixelForge Engine!")
}

fn update() {
    clear("#111418")
    
    // Draw background grid marker
    rect(40, 40, 160, 100, "#1a1d24")
    
    // Draw player and move them dynamically across frames
    rect(playerX, playerY, 16, 16, "#ff004d")
    
    playerX = playerX + 1
    if playerX > 256 {
        playerX = 0
    }
}</textarea>
                    </div>

                    <div class="viewport-pane">
                        <div class="editor-header">Game Viewport (256x256)</div>
                        <div class="canvas-container">
                            <canvas id="game-viewport" width="256" height="256"></canvas>
                        </div>
                    </div>
                </div>
            </section>

            <section id="sprite-workspace" class="workspace-view">
                <div class="editor-header">Sprite Editor Panel</div>
                <div class="placeholder-box">[ Sprite Editor coming soon ]</div>
            </section>
            <section id="music-workspace" class="workspace-view">
                <div class="editor-header">Music Tracker Panel</div>
                <div class="placeholder-box">[ Music Sequencer coming soon ]</div>
            </section>

        </main>
    </div>

    <footer class="console-footer">
        <div class="console-header">Console Output</div>
        <div class="console-log" id="console-output"></div>
    </footer>

    <script type="module" src="js/app.js"></script>
</body>
</html>
